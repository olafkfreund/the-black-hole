name: Build, Test & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Go Vet
        run: go vet ./...

      - name: Run Unit Tests
        run: go test -v ./...

  build-and-release:
    name: Build & Publish Release
    needs: validate-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Compile Cross-Platform Binaries
        run: |
          mkdir -p dist
          # Build Gateway Server (Native Linux build due to SQLite CGo dependency)
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o dist/mcp-gateway-linux-amd64 main.go
          
          # Build Admin CLI Client (Zero-dependencies, cross-compiles to all platforms)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/mcp-cli-linux-amd64 cmd/mcp-cli/main.go
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o dist/mcp-cli-darwin-amd64 cmd/mcp-cli/main.go
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o dist/mcp-cli-darwin-arm64 cmd/mcp-cli/main.go
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/mcp-cli-windows-amd64.exe cmd/mcp-cli/main.go

      - name: Build SBOM Generator
        run: go build -o sbom-gen cmd/sbom-gen/main.go

      - name: Generate SPDX SBOM
        run: ./sbom-gen go.mod dist/sbom.spdx.json

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            Janus - Enterprise-grade MCP API Gateway & Portal (Release ${{ github.ref_name }})
            
            ### Included Artifacts
            - **mcp-gateway**: API Server & SSE Listener (cross-platform)
            - **mcp-cli**: Administration & Monitoring command-line client (cross-platform)
            - **sbom.spdx.json**: SPDX 2.3 Software Bill of Materials (SBOM) cataloging dependencies
            - **checksums.txt**: SHA256 checksum hashes for verification of build artifacts
