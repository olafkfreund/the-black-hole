apiVersion: v1
kind: Namespace
metadata:
  name: janus
---
# Secrets. Values MUST be >= 32 bytes (the gateway fails closed otherwise).
# In production, source these from AWS Secrets Manager (External Secrets / CSI).
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secrets
  namespace: janus
type: Opaque
stringData:
  jwt-secret: "change-me-to-a-long-random-string-min-32-bytes-xxxxx"
  gateway-token: "change-me-to-a-long-random-bearer-token-min-32-bytes"
---
# SQLite persistence for the single-node deployment. For horizontal scaling switch
# to Postgres and use k8s/janus-scaled.yaml (RWO volumes cannot be shared by >1 pod).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-gateway-pvc
  namespace: janus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-api-gateway
  namespace: janus
  labels:
    app: mcp-api-gateway
spec:
  # Single replica: SQLite on a ReadWriteOnce volume cannot be shared across pods.
  # To scale horizontally, migrate to Postgres (see k8s/janus-scaled.yaml).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-api-gateway
  template:
    metadata:
      labels:
        app: mcp-api-gateway
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
      containers:
      - name: gateway
        image: 796973489124.dkr.ecr.eu-west-2.amazonaws.com/janus:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false # needs to write the SQLite DB in /app/data
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_PATH
          value: "/app/data/mcp-gateway.db"
        - name: VAULT_PROVIDER
          value: "local"
        - name: VAULT_LOCAL_PATH
          value: "/app/data/secrets.json"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: jwt-secret
        - name: GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: gateway-token
        # Seed the demo connections (LCH mock + Treasury + Coinbase) so the live
        # environment has tools to exercise. The LCH mock is on 127.0.0.1, so allow
        # private egress for the demo only.
        - name: SEED_DEMO_DATA
          value: "true"
        - name: EGRESS_ALLOW_PRIVATE
          value: "true"
        # Performance / resilience tuning
        - name: CONFIG_CACHE_TTL
          value: "5s"
        - name: SECRET_CACHE_TTL
          value: "30s"
        - name: RESPONSE_CACHE_TTL
          value: "0s"
        - name: DOWNSTREAM_RETRIES
          value: "2"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        volumeMounts:
        - name: gateway-storage
          mountPath: /app/data
      volumes:
      - name: gateway-storage
        persistentVolumeClaim:
          claimName: mcp-gateway-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: mcp-api-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-api-gateway
  namespace: janus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    # Sticky sessions for the SSE transport: keeps /sse and /messages on one pod.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    # SSE needs buffering off and long read timeouts.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  tls:
  - hosts:
    - janus.13.134.88.9.nip.io
    secretName: janus-tls
  rules:
  - host: janus.13.134.88.9.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mcp-api-gateway
            port:
              number: 8080
