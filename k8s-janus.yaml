# Pipeline-applied manifest (GHA deploy.yml). Stateless, Postgres-backed gateway.
#
# Managed OUT-OF-BAND (not here):
#   - Namespace `janus`                      (cluster-scoped)
#   - Secret  `mcp-gateway-secrets`          (jwt-secret, gateway-token, db-password, database-url)
#   - Postgres `janus-db`                    (k8s/janus-db.yaml)
#   - HPA + PodDisruptionBudget              (k8s/janus-scaling.yaml)
#
# `replicas` is intentionally omitted so the HorizontalPodAutoscaler owns the count
# (a plain apply would otherwise reset it on every deploy).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-api-gateway
  namespace: janus
  labels:
    app: mcp-api-gateway
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: mcp-api-gateway
  template:
    metadata:
      labels:
        app: mcp-api-gateway
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: mcp-api-gateway
      containers:
      - name: gateway
        image: 796973489124.dkr.ecr.eu-west-2.amazonaws.com/janus:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # stateless: state lives in Postgres
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        env:
        - name: PORT
          value: "8080"
        # System of record: in-cluster Postgres (shared by all replicas).
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: database-url
        # Local vault is per-pod/ephemeral on an emptyDir. The demo connections use
        # auth_type=none, so no shared secret state is required. For downstream-auth
        # at scale, switch to a shared vault backend.
        - name: VAULT_PROVIDER
          value: "local"
        - name: VAULT_LOCAL_PATH
          value: "/app/data/secrets.json"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: jwt-secret
        - name: GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: gateway-token
        - name: SEED_DEMO_DATA
          value: "true"
        - name: EGRESS_ALLOW_PRIVATE
          value: "true"
        - name: CONFIG_CACHE_TTL
          value: "5s"
        - name: SECRET_CACHE_TTL
          value: "30s"
        - name: RESPONSE_CACHE_TTL
          value: "10s"
        - name: DB_MAX_OPEN_CONNS
          value: "25"
        - name: DB_MAX_IDLE_CONNS
          value: "10"
        - name: DOWNSTREAM_RETRIES
          value: "2"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        volumeMounts:
        - name: vault-tmp
          mountPath: /app/data
      volumes:
      - name: vault-tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: mcp-api-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-api-gateway
  namespace: janus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  tls:
  - hosts:
    - janus.13.134.88.9.nip.io
    secretName: janus-tls
  rules:
  - host: janus.13.134.88.9.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mcp-api-gateway
            port:
              number: 8080
