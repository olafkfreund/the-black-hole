# Horizontally-scalable variant of the MCP API Gateway.
#
# Prerequisites (do NOT apply this until they exist):
#   1. A reachable Postgres (e.g. RDS) and DATABASE_URL in the secret below.
#   2. A working vault backend, or keep VAULT_PROVIDER=local with shared state.
#
# Pods are stateless (system of record = Postgres), so they scale via the HPA
# without the SQLite/RWO single-node constraint. Apply with:
#   kubectl apply -f k8s/janus-scaled.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secrets
  namespace: janus
type: Opaque
stringData:
  jwt-secret: "change-me-to-a-long-random-string-min-32-bytes-xxxxx"
  gateway-token: "change-me-to-a-long-random-bearer-token-min-32-bytes"
  database-url: "postgres://gateway:CHANGE_ME@postgres.janus.svc:5432/mcp_gateway?sslmode=require"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-api-gateway
  namespace: janus
  labels:
    app: mcp-api-gateway
spec:
  replicas: 2 # managed by the HPA below
  selector:
    matchLabels:
      app: mcp-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-api-gateway
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: mcp-api-gateway
      containers:
      - name: gateway
        image: 796973489124.dkr.ecr.eu-west-2.amazonaws.com/janus:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # stateless: no local SQLite to write
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: database-url
        - name: VAULT_PROVIDER
          value: "local"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: jwt-secret
        - name: GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-gateway-secrets
              key: gateway-token
        - name: CONFIG_CACHE_TTL
          value: "5s"
        - name: SECRET_CACHE_TTL
          value: "30s"
        - name: RESPONSE_CACHE_TTL
          value: "10s"
        - name: DB_MAX_OPEN_CONNS
          value: "25"
        - name: DB_MAX_IDLE_CONNS
          value: "10"
        - name: DOWNSTREAM_RETRIES
          value: "2"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: mcp-api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mcp-api-gateway
